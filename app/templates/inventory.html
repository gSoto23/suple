{% extends "base.html" %}

{% block content %}
<div class="card">
    <div class="page-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h3>Inventario</h3>
        <div class="page-header-actions" style="display: flex; gap: 10px;">
            <button class="btn btn-secondary" onclick="openConfigModal()"><i class="fa-solid fa-cog"></i> Config</button>
            <button class="btn btn-info" onclick="openFieldsModal()"><i class="fa-solid fa-list-check"></i> Campos Dinámicos</button>
            <button class="btn btn-warning" onclick="exportJSON()"><i class="fa-solid fa-download"></i> Exportar</button>
            <button class="btn btn-danger" onclick="triggerImport()"><i class="fa-solid fa-upload"></i> Importar</button>
            <button class="btn btn-table-action" onclick="openCreateProductModal()">Nuevo Producto</button>
        </div>
    </div>
    <div class="filters">
        <input type="text" id="table-search" class="search-input" placeholder="Buscar productos..."
            onkeyup="filterTable('products-table', this.value)">
    </div>

    <div class="table-responsive">
        <table class="table sortable" id="products-table">
            <thead>
                <tr>
                    <th onclick="sortTable(0, 'products-table')">SKU <i class="fa-solid fa-sort"></i></th>
                    <th onclick="sortTable(1, 'products-table')">Nombre <i class="fa-solid fa-sort"></i></th>
                    <th onclick="sortTable(2, 'products-table')">Categoría <i class="fa-solid fa-sort"></i></th>
                    <th onclick="sortTable(3, 'products-table')">Stock <i class="fa-solid fa-sort"></i></th>
                    <th onclick="sortTable(4, 'products-table')">Precio <i class="fa-solid fa-sort"></i></th>
                    <th onclick="sortTable(5, 'products-table')">Estado <i class="fa-solid fa-sort"></i></th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <!-- Populated by JS -->
            </tbody>
        </table>
    </div>

    <div style="display: none;">
        <input type="file" id="import-file" accept=".json" onchange="handleImport(this)">
    </div>

    <!-- Configuration Modal -->
    <div id="config-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 800px;">
            <div class="modal-header">
                <h3>Configuración del Negocio</h3>
                <button onclick="closeConfigModal()" class="modal-close">&times;</button>
            </div>
            <form id="config-form">
                <div class="form-group">
                    <label>Nombre del Negocio</label>
                    <input type="text" id="config-business-name" required>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Cuenta Bancaria (IBAN)</label>
                        <input type="text" id="config-account">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>SINPE Móvil</label>
                        <input type="text" id="config-sinpe">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Teléfono Servicio al Cliente</label>
                        <input type="text" id="config-phone">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem; align-items: center; margin-bottom: 1rem; padding: 1rem; background: #f9f9f9; border-radius: 8px;">
                    <strong style="margin-right: 15px;">Módulos del Sistema:</strong>
                    <div style="display: flex; align-items: center; gap: 5px;">
                        <input type="checkbox" id="config-enable-subs" style="width: 18px; height: 18px;">
                        <label for="config-enable-subs" style="margin: 0; cursor: pointer;">Habilitar Suscripciones</label>
                    </div>
                    <div style="display: flex; align-items: center; gap: 5px; margin-left: 20px;">
                        <input type="checkbox" id="config-enable-mkt" style="width: 18px; height: 18px;">
                        <label for="config-enable-mkt" style="margin: 0; cursor: pointer;">Habilitar Marketing & WhatsApp</label>
                    </div>
                </div>

                <div id="config-sub-fields-container" style="display: flex; gap: 1rem; margin-bottom: 1rem;">
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>Descuento x Suscripción (%)</label>
                        <input type="number" step="0.01" id="config-sub-discount" placeholder="Ej: 15.00">
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 0;">
                        <label>Contrato Mínimo (Días)</label>
                        <input type="number" id="config-sub-min-duration" placeholder="Ej: 90">
                    </div>
                </div>

                <div class="form-group">
                    <label>Sucursales / Direcciones</label>
                    <div id="address-container">
                        <!-- Dynamic addresses -->
                    </div>
                    <button type="button" class="btn btn-sm btn-secondary" onclick="addAddressField()"><i
                            class="fa-solid fa-plus"></i> Agregar Sucursal</button>
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn" onclick="closeConfigModal()"
                        style="background-color: #ccc;">Cancelar</button>
                    <button type="submit" class="btn btn-table-action">Guardar Configuración</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="product-modal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">Nuevo Producto</h3>
                <button onclick="closeProductModal()" class="modal-close">&times;</button>
            </div>

            <form id="product-form">
                <input type="hidden" id="product-id">

                <div class="form-group">
                    <label>SKU</label>
                    <input type="text" id="product-sku" required>
                </div>

                <div class="form-group">
                    <label>Nombre</label>
                    <input type="text" id="product-name" required>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Categoría</label>
                        <input type="text" id="product-category" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Marca</label>
                        <input type="text" id="product-brand">
                    </div>
                </div>

                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Precio ({{ settings.CURRENCY_SYMBOL }})</label>
                        <input type="number" id="product-price" step="0.01" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Stock Actual</label>
                        <input type="number" id="product-stock" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Stock Mínimo</label>
                        <input type="number" id="product-min-stock" value="5">
                    </div>
                </div>

                <div class="form-group">
                    <label>URL Imagen</label>
                    <input type="url" id="product-image" placeholder="https://example.com/image.jpg">
                </div>



                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="product-description"
                        style="width: 100%; padding: 0.5rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm);"
                        rows="3"></textarea>
                </div>

                <div class="form-group">
                    <label>Estado</label>
                    <select id="product-active"
                        style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: white;">
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>

                <div id="custom-fields-container" style="border-top: 1px solid #eee; padding-top: 15px; margin-top: 15px;">
                   <!-- dynamic fields here -->
                </div>

                <div class="modal-actions">
                    <button type="button" class="btn" onclick="closeProductModal()"
                        style="background-color: #ccc;">Cancelar</button>
                    <button type="submit" class="btn btn-table-action">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Product Fields Modal -->
    <div id="fields-modal" class="modal-overlay">
        <div class="modal-content" style="max-width: 600px;">
            <div class="modal-header">
                <h3>Administrar Campos Dinámicos</h3>
                <button onclick="closeFieldsModal()" class="modal-close">&times;</button>
            </div>
            <div style="background: #f8f9fa; padding: 1.5rem; border-radius: 8px; border: 1px solid #e9ecef; margin-bottom: 1.5rem;">
                <h4 style="margin-top: 0; color: var(--color-primary); margin-bottom: 1rem;"><i class="fa-solid fa-plus-circle"></i> Nuevo Campo</h4>
                
                <div style="display: flex; gap: 15px; align-items: flex-start; flex-wrap: wrap;">
                    <div class="form-group" style="flex: 1; min-width: 200px; margin: 0;">
                        <label style="font-weight: 500;">Nombre <small>(Ej: Sabor, Talla)</small></label>
                        <input type="text" id="new-field-name" placeholder="Escriba el nombre" style="padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px; width: 100%;">
                    </div>
                    
                    <div class="form-group" style="flex: 1; min-width: 150px; margin: 0;">
                        <label style="font-weight: 500;">Tipo de Dato</label>
                        <select id="new-field-type" style="width: 100%; padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px; background: white;">
                            <option value="text">Texto Corto</option>
                            <option value="number">Número</option>
                            <option value="select">Lista de Selección</option>
                        </select>
                    </div>
                    
                    <div style="display: flex; align-items: center; align-self: flex-start; margin-top: 2rem; gap: 8px; min-width: 100px;">
                        <input type="checkbox" id="new-field-required" style="width: 1.2rem; height: 1.2rem; cursor: pointer;">
                        <label for="new-field-required" style="margin: 0; cursor: pointer; font-weight: 500;">Requerido</label>
                    </div>
                </div>
                
                <div id="new-field-options-container" class="form-group" style="display: none; margin-top: 15px; border-top: 1px dashed #ccc; padding-top: 15px;">
                    <label style="font-weight: 500;">Opciones Disponibles <small style="color:#666;">(Separadas por coma)</small></label>
                    <input type="text" id="new-field-options" placeholder="Ejemplo: Vainilla, Chocolate, Fresa" style="padding: 0.6rem; border: 1px solid #ccc; border-radius: 4px; width: 100%;">
                </div>
                
                <div style="margin-top: 15px; justify-content: flex-end; display: flex;">
                    <button type="button" class="btn btn-table-action" onclick="createFieldDef()">
                        <i class="fa-solid fa-save"></i> Agregar Campo
                    </button>
                </div>
            </div>
            
            <h4 style="margin-bottom: 1rem; color: var(--color-text);"><i class="fa-solid fa-list-ul"></i> Campos Implementados</h4>
            <div class="table-responsive" style="max-height: 250px; overflow-y: auto; border: 1px solid var(--color-border); border-radius: 8px;">
                <table class="table" id="fields-table" style="margin-bottom: 0;">
                    <thead style="background: #f8f9fa;">
                        <tr>
                            <th style="color: var(--color-text); border-bottom: 2px solid #dee2e6;">Nombre</th>
                            <th style="color: var(--color-text); border-bottom: 2px solid #dee2e6;">Tipo</th>
                            <th style="color: var(--color-text); border-bottom: 2px solid #dee2e6;">Requerido</th>
                            <th style="color: var(--color-text); border-bottom: 2px solid #dee2e6;">Opciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Populated by JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let isEditing = false;
        let globalConfig = {};

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            loadProducts();
        });

        async function loadProducts() {
            const api = new ApiClient();
            try {
                // Fetch config
                try {
                     globalConfig = await api.get('/config/');
                } catch (e) {
                     console.error('Error fetching config', e);
                     globalConfig = {};
                }
                
                const response = await api.get('/products/');
                let products = Array.isArray(response) ? response : [];

                const tbody = document.querySelector('#products-table tbody');
                tbody.innerHTML = products.map(p => {
                    let statusLabel = 'Activo';
                    let statusClass = 'success';

                    if (!p.is_active) {
                        statusLabel = 'Inactivo';
                        statusClass = 'inactive'; // defined in css (danger)
                    } else if (p.stock === 0) {
                        statusLabel = 'Out of Stock';
                        statusClass = 'danger';
                    } else if (p.stock <= p.min_stock) {
                        statusLabel = 'Bajo Stock';
                        statusClass = 'warning';
                    }

                    return `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 10px;">
                            ${p.image_url ? `<img src="${p.image_url}" alt="${p.name}" style="width: 40px; height: 40px; object-fit: cover; border-radius: 4px;">` : '<div style="width: 40px; height: 40px; background: #eee; border-radius: 4px; display: flex; align-items: center; justify-content: center; color: #999;"><i class="fa-solid fa-image"></i></div>'}
                            <span>${p.sku}</span>
                        </div>
                    </td>
                    <td>${p.name}</td>
                    <td>${p.category}</td>
                    <td>${p.stock}</td>
                    <td>${window.APP_CONFIG.currency} ${parseFloat(p.price).toLocaleString()}</td>
                    <td><span class="badge ${statusClass}">${statusLabel}</span></td>
                    <td>
                        <button class="btn btn-sm btn-table-action" onclick="openEditProductModal(${p.id})">Editar</button>
                    </td>
                </tr>
                `;
                }).join('');
            } catch (e) {
                console.error(e);
            }
        }

        // --- Config Modal Functions ---
        function openConfigModal() {
            document.getElementById('config-business-name').value = globalConfig.business_name || '';
            document.getElementById('config-account').value = globalConfig.account_number || '';
            document.getElementById('config-sinpe').value = globalConfig.sinpe_number || '';
            document.getElementById('config-phone').value = globalConfig.customer_service_phone || '';
            document.getElementById('config-sub-discount').value = globalConfig.subscription_discount_percentage || 0;
            document.getElementById('config-sub-min-duration').value = globalConfig.min_subscription_duration_days || 0;
            document.getElementById('config-enable-subs').checked = globalConfig.enable_subscriptions !== false;
            document.getElementById('config-enable-mkt').checked = globalConfig.enable_marketing !== false;
            
            toggleSubConfigFields();

            // Addresses
            const container = document.getElementById('address-container');
            container.innerHTML = '';
            const addresses = globalConfig.store_addresses || [];

            if (addresses.length === 0) {
                addAddressField(); // Add at least one empty
            } else {
                addresses.forEach(addr => addAddressField(addr));
            }

            document.getElementById('config-modal').style.display = 'flex';
        }

        function closeConfigModal() {
            document.getElementById('config-modal').style.display = 'none';
        }

        function addAddressField(data = {}) {
            const container = document.getElementById('address-container');
            const div = document.createElement('div');
            div.style.border = '1px solid #eee';
            div.style.padding = '10px';
            div.style.marginBottom = '10px';
            div.style.borderRadius = '8px';
            div.style.background = '#f9f9f9';

            div.innerHTML = `
                <div style="display: flex; gap: 10px; margin-bottom: 5px;">
                    <input type="text" placeholder="Nombre Sucursal (Ej. San José)" class="addr-name" value="${data.name || ''}" style="flex: 1; padding: 5px;">
                    <button type="button" class="btn btn-sm btn-danger" onclick="this.parentElement.parentElement.remove()" tabindex="-1"><i class="fa-solid fa-trash"></i></button>
                </div>
                <div style="margin-bottom: 5px;">
                    <input type="text" placeholder="Dirección Exacta" class="addr-text" value="${data.address || ''}" style="width: 100%; padding: 5px;">
                </div>
                <div>
                    <input type="text" placeholder="Link Google Maps (Pin)" class="addr-pin" value="${data.map_pin || ''}" style="width: 100%; padding: 5px;">
                </div>
            `;
            container.appendChild(div);
        }

        document.getElementById('config-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            // Collect addresses
            const addressDivs = document.querySelectorAll('#address-container > div');
            const addresses = Array.from(addressDivs).map(div => ({
                name: div.querySelector('.addr-name').value,
                address: div.querySelector('.addr-text').value,
                map_pin: div.querySelector('.addr-pin').value
            })).filter(a => a.name.trim() !== ''); // Filter empty

            const configData = {
                business_name: document.getElementById('config-business-name').value,
                account_number: document.getElementById('config-account').value,
                sinpe_number: document.getElementById('config-sinpe').value,
                customer_service_phone: document.getElementById('config-phone').value,
                subscription_discount_percentage: parseFloat(document.getElementById('config-sub-discount').value) || 0,
                min_subscription_duration_days: parseInt(document.getElementById('config-sub-min-duration').value) || 0,
                enable_subscriptions: document.getElementById('config-enable-subs').checked,
                enable_marketing: document.getElementById('config-enable-mkt').checked,
                store_addresses: addresses
            };

            const api = new ApiClient();
            try {
                const updatedConfig = await api.put('/config/', configData);
                globalConfig = updatedConfig;
                showToast('Configuración guardada correctamente', 'success');
                closeConfigModal();
            } catch (err) {
                console.error(err);
                showToast('Error al guardar configuración', 'error');
            }
        });

        // --- End Config Functions ---

        document.getElementById('config-enable-subs').addEventListener('change', toggleSubConfigFields);

        function toggleSubConfigFields() {
            const isEnabled = document.getElementById('config-enable-subs').checked;
            const container = document.getElementById('config-sub-fields-container');
            if (isEnabled) {
                container.style.display = 'flex';
            } else {
                container.style.display = 'none';
            }
        }

        // Modal Functions
        async function openCreateProductModal() {
            isEditing = false;
            document.getElementById('modal-title').innerText = 'Nuevo Producto';
            document.getElementById('product-form').reset();
            document.getElementById('product-id').value = '';
            document.getElementById('product-sku').readOnly = false; // Allow SKU edit on create
            document.getElementById('product-active').value = 'true'; // Default active
            
            await renderCustomFieldsForm({});
            document.getElementById('product-modal').style.display = 'flex';
        }

        async function openEditProductModal(id) {
            isEditing = true;
            document.getElementById('modal-title').innerText = 'Editar Producto';

            const api = new ApiClient();
            try {
                const p = await api.get(`/products/${id}`);

                document.getElementById('product-id').value = p.id;
                document.getElementById('product-sku').value = p.sku;
                document.getElementById('product-sku').readOnly = true;

                document.getElementById('product-name').value = p.name;
                document.getElementById('product-category').value = p.category;
                document.getElementById('product-brand').value = p.brand || '';
                document.getElementById('product-price').value = p.price;
                document.getElementById('product-stock').value = p.stock;
                document.getElementById('product-min-stock').value = p.min_stock;
                document.getElementById('product-image').value = p.image_url || '';
                document.getElementById('product-description').value = p.description || '';
                document.getElementById('product-active').value = (p.is_active !== undefined ? p.is_active : true).toString();

                await renderCustomFieldsForm(p.custom_fields || {});

                document.getElementById('product-modal').style.display = 'flex';
            } catch (e) {
                showToast('Error cargando producto', 'error');
            }
        }

        function closeProductModal() {
            document.getElementById('product-modal').style.display = 'none';
        }

        document.getElementById('product-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const customFieldsInputs = document.querySelectorAll('.custom-field-input');
            const custom_fields_data = {};
            customFieldsInputs.forEach(input => {
                if (input.value !== '') {
                     custom_fields_data[input.dataset.name] = input.value;
                }
            });

            const data = {
                sku: document.getElementById('product-sku').value,
                name: document.getElementById('product-name').value,
                category: document.getElementById('product-category').value,
                brand: document.getElementById('product-brand').value,
                price: parseFloat(document.getElementById('product-price').value),
                stock: parseInt(document.getElementById('product-stock').value),
                min_stock: parseInt(document.getElementById('product-min-stock').value),
                image_url: document.getElementById('product-image').value,
                description: document.getElementById('product-description').value,
                is_active: document.getElementById('product-active').value === 'true',
                custom_fields: custom_fields_data
            };

            const api = new ApiClient();
            try {
                if (isEditing) {
                    const id = document.getElementById('product-id').value;
                    await api.put(`/products/${id}`, data);
                    showToast('Producto actualizado', 'success');
                } else {
                    await api.post('/products/', data);
                    showToast('Producto creado', 'success');
                }
                closeProductModal();
                loadProducts();
            } catch (err) {
                showToast('Error: ' + (err.detail || err.message), 'error');
            }
        });

        // Export/Import
        async function exportJSON() {
            const api = new ApiClient();
            try {
                const data = await api.get('/products/export/json');
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data, null, 2));
                const downloadAnchorNode = document.createElement('a');
                downloadAnchorNode.setAttribute("href", dataStr);
                downloadAnchorNode.setAttribute("download", "inventario_" + formatDateCR(new Date().toISOString()).replace(/\//g, "-") + ".json");
                document.body.appendChild(downloadAnchorNode); // required for firefox
                downloadAnchorNode.click();
                downloadAnchorNode.remove();
                showToast('Exportación exitosa', 'success');
            } catch (e) {
                showToast('Error al exportar', 'error');
            }
        }

        function triggerImport() {
            document.getElementById('import-file').click();
        }

        async function handleImport(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const json = JSON.parse(e.target.result);
                    const api = new ApiClient();

                    // The endpoint expects a list of ProductCreate objects
                    // We need to make sure fields match.
                    // Endpoint: POST /products/import/json

                    const result = await api.post('/products/import/json', json);
                    showToast(`Importación: ${result.created} creados, ${result.updated} actualizados`, 'success');
                    loadProducts();
                } catch (err) {
                    console.error(err);
                    showToast('Error al importar: Formato inválido o error de servidor', 'error');
                }
                input.value = ''; // Reset
            };
            reader.readAsText(file);
        }

        // --- Custom Fields Functions ---
        let productFieldsCache = [];

        document.getElementById('new-field-type').addEventListener('change', function(e) {
            const optionsContainer = document.getElementById('new-field-options-container');
            if(e.target.value === 'select') {
                optionsContainer.style.display = 'block';
            } else {
                optionsContainer.style.display = 'none';
            }
        });

        async function openFieldsModal() {
            document.getElementById('fields-modal').style.display = 'flex';
            await loadFieldsTable();
        }

        function closeFieldsModal() {
            document.getElementById('fields-modal').style.display = 'none';
        }

        async function loadProductFieldsDefs() {
            if (productFieldsCache.length > 0) return productFieldsCache;
            const api = new ApiClient();
            try {
                productFieldsCache = await api.get('/products/fields/definitions');
                return productFieldsCache;
            } catch (err) {
                console.error("Error loading field definitions", err);
                return [];
            }
        }

        async function renderCustomFieldsForm(existingData = {}) {
            const container = document.getElementById('custom-fields-container');
            container.innerHTML = '<h4 style="margin-bottom: 15px; color: var(--color-primary);">Campos de Producto Extra</h4>';
            
            const defs = await loadProductFieldsDefs();
            if (defs.length === 0) {
                 container.innerHTML += '<p style="color: #999; font-size: 0.9em;">No hay campos dinámicos definidos.</p>';
                 return;
            }

            defs.forEach(def => {
                const value = existingData[def.name] !== undefined ? existingData[def.name] : '';
                const requiredAttr = def.is_required ? 'required' : '';
                
                let inputHtml = '';
                if (def.field_type === 'text') {
                    inputHtml = `<input type="text" class="custom-field-input" data-name="${def.name}" value="${value}" ${requiredAttr}>`;
                } else if (def.field_type === 'number') {
                    inputHtml = `<input type="number" step="any" class="custom-field-input" data-name="${def.name}" value="${value}" ${requiredAttr}>`;
                } else if (def.field_type === 'select') {
                    const optionsHtml = def.options.map(o => `<option value="${o}" ${o === value ? 'selected' : ''}>${o}</option>`).join('');
                    inputHtml = `<select class="custom-field-input" data-name="${def.name}" ${requiredAttr} style="width: 100%; padding: 0.75rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: white;">
                        <option value="">-- Ninguno --</option>
                        ${optionsHtml}
                    </select>`;
                }
                
                const group = document.createElement('div');
                group.className = 'form-group';
                group.style.marginBottom = '10px';
                group.innerHTML = `<label style="font-weight: 500;">${def.name} ${def.is_required ? '<span style="color:red">*</span>' : ''}</label>${inputHtml}`;
                container.appendChild(group);
            });
        }

        async function loadFieldsTable() {
            const fields = await loadProductFieldsDefs();
            const tbody = document.querySelector('#fields-table tbody');
            tbody.innerHTML = fields.map(f => {
                const isRequired = f.is_required ? '<span style="color:red">Sí</span>' : 'No';
                const options = f.options && f.options.length > 0 ? f.options.join(', ') : '-';
                return `<tr>
                    <td>${f.name}</td>
                    <td>${f.field_type}</td>
                    <td>${isRequired}</td>
                    <td>${options}</td>
                </tr>`;
            }).join('');
        }

        async function createFieldDef() {
            const name = document.getElementById('new-field-name').value;
            const type = document.getElementById('new-field-type').value;
            const required = document.getElementById('new-field-required').checked;
            let options = [];
            
            if (!name) {
                showToast('El nombre es obligatorio', 'error');
                return;
            }

            if (type === 'select') {
                const optStr = document.getElementById('new-field-options').value;
                if (!optStr) {
                    showToast('Escriba al menos una opción', 'error');
                    return;
                }
                options = optStr.split(',').map(s => s.trim()).filter(s => s !== '');
            }

            const data = {
                name: name,
                field_type: type,
                is_required: required,
                options: options
            };

            const api = new ApiClient();
            try {
                await api.post('/products/fields/definitions', data);
                showToast('Campo añadido', 'success');
                // Reset form
                document.getElementById('new-field-name').value = '';
                document.getElementById('new-field-options').value = '';
                document.getElementById('new-field-required').checked = false;
                
                // Reload
                await loadFieldsTable();
            } catch (err) {
                showToast('Error: ' + (err.detail || err.message), 'error');
            }
        }
    </script>
    {% endblock %}
